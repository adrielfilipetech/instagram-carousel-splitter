<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>ICS - Instagram Carousel Splitter</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ICS">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
</head>

<script>
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'inline-flex';
    });

    installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            installBtn.style.display = 'none';
        }
        deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
    });
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/instagram-carousel-splitter/service-worker.js')
        .then(reg => console.log('SW registrado:', reg.scope))
        .catch(err => console.error('SW erro:', err));
    });
  }
</script>

<body>
    <div class="container">
        <h1>Instagram Carousel Splitter</h1>
        <p class="subtitle">Auto split your instagram carrousel</p>

        <div class="tabs">
            <button class="tab active" data-tab="single">Single Image</button>
            <button class="tab" data-tab="batch">Batch Mode</button>
        </div>

        <!-- Single Image -->
        <div id="single" class="tab-content active">
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-icon">📁</div>
                <div class="drop-zone-text">Drop your image here</div>
                <div class="drop-zone-hint">or</div>
                <button class="select-btn" onclick="document.getElementById('fileInput').click()">
                    Select image
                </button>
            </div>

            <input type="file" id="fileInput" class="file-input" accept="image/*">

            <div class="preview" id="preview">
                <img id="previewImage" class="preview-image" alt="Preview">
                <div class="file-info">
                    <p><strong>Filename:</strong> <span id="fileName"></span></p>
                    <p><strong>Size:</strong> <span id="dimensions"></span></p>
                    <p><strong>Number of pages:</strong> <span id="parts"></span></p>
                </div>
                <button class="process-btn" id="processBtn">Process and Download</button>
            </div>
        </div>

        <!-- Batch Mode -->
        <div id="batch" class="tab-content">
            <div class="drop-zone" id="dropZoneBatch">
                <div class="drop-zone-icon">📁</div>
                <div class="drop-zone-text">Drop multiple images here</div>
                <div class="drop-zone-hint">or</div>
                <button class="select-btn" onclick="document.getElementById('fileInputBatch').click()">
                    Select images
                </button>
            </div>

            <input type="file" id="fileInputBatch" class="file-input" accept="image/*" multiple>

            <div class="file-list" id="fileList"></div>

            <button class="process-btn batch-process-btn" id="processBatchBtn" style="display: none;">
                Process All (<span id="fileCount">0</span> images)
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing your image<span id="loadingPlural"></span>...</p>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
    </div>
   <!-- Action Buttons -->
    <div class="top-buttons">
        <a href="https://github.com/adrielfilipetech/instagram-carousel-splitter" target="_blank" class="github-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="white">

            </svg>
            GitHub
        </a>
        <a href="https://ko-fi.com/adrielfilipe" target="_blank" class="kofi-btn">
            <img src="https://storage.ko-fi.com/cdn/cup-border.png" alt="Ko-fi" class="kofi-icon">
            Support me
        </a>
        <button class="install-btn" id="installBtn" style="display:none;">
            ⬇️ Install App
        </button>
    </div>

    <canvas id="canvas" style="display:none"></canvas>

    <script src="assets/js/libs/jszip.min.js"></script>
    <script src="assets/js/main.js"></script>

      
</body>

</html>
